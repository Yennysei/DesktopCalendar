Configuration:
  Properties:
    Property:
      - name: pattern
        value: "%d{ISO8601} [%t] %-5level %c{1.} - %msg%n"

  Appenders:
    Console:
      name: Console
      PatternLayout:
        pattern: "${pattern}"

  Loggers:
    Root:
      level: info
      AppenderRef:
        - ref: Console
